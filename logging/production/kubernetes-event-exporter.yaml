# kubernetes-event-exporter: reads Kubernetes events from the API and writes
# them as JSON to stdout. Vector's kubernetes_logs source then picks them up
# and routes them to the logs.k8s_events ClickHouse table (see vector-config.yaml).
#
# Upstream: https://github.com/resmoio/kubernetes-event-exporter
# Replaces the older heptio/eventrouter (gcr.io registry was retired).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-event-exporter
  namespace: logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-event-exporter
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-event-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-event-exporter
subjects:
  - kind: ServiceAccount
    name: kubernetes-event-exporter
    namespace: logging
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-event-exporter-config
  namespace: logging
data:
  config.yaml: |
    logLevel: info
    logFormat: json
    route:
      routes:
        - match:
            - receiver: "stdout"
    receivers:
      - name: "stdout"
        file:
          path: "/dev/stdout"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-event-exporter
  namespace: logging
  labels:
    app: kubernetes-event-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-event-exporter
  template:
    metadata:
      labels:
        app: kubernetes-event-exporter
    spec:
      serviceAccountName: kubernetes-event-exporter
      containers:
        - name: event-exporter
          image: ghcr.io/resmoio/kubernetes-event-exporter:v1.7
          imagePullPolicy: IfNotPresent
          args: ["-conf=/etc/event-exporter/config.yaml"]
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/event-exporter
      volumes:
        - name: config
          configMap:
            name: kubernetes-event-exporter-config
