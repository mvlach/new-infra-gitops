apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: logging
  labels:
    app: vector
spec:
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
      annotations:
        checksum/config: "v1"
    spec:
      serviceAccountName: vector
      tolerations:
        # Collect logs from control-plane nodes too.
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      terminationGracePeriodSeconds: 60
      containers:
        - name: vector
          image: timberio/vector:0.40.0-alpine
          imagePullPolicy: IfNotPresent
          args: ["--config-dir", "/etc/vector/"]
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: VECTOR_SELF_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VECTOR_SELF_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: clickhouse-endpoint
                  key: host
            - name: CLICKHOUSE_VECTOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: vector-password
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/vector/
              readOnly: true
            - name: var-log-pods
              mountPath: /var/log/pods
              readOnly: true
            - name: var-log-containers
              mountPath: /var/log/containers
              readOnly: true
            - name: var-lib-docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: data
              mountPath: /vector-data-dir
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: var-log-pods
          hostPath:
            path: /var/log/pods
        - name: var-log-containers
          hostPath:
            path: /var/log/containers
        - name: var-lib-docker-containers
          hostPath:
            path: /var/lib/docker/containers
        - name: data
          hostPath:
            path: /var/lib/vector
            type: DirectoryOrCreate
