apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: logging
data:
  vector.yaml: |
    # -------------------------------------------------------------------------
    # Sources
    # -------------------------------------------------------------------------
    sources:
      # Container stdout/stderr from every pod on every node.
      k8s_logs:
        type: kubernetes_logs
        # default self_node_name via Downward API env, see DaemonSet spec.

    # -------------------------------------------------------------------------
    # Transforms
    # -------------------------------------------------------------------------
    transforms:
      # Split kubernetes_logs into two streams: regular pod logs, and
      # JSON events produced by kubernetes-event-exporter (which we read
      # as logs too).
      route_by_source:
        type: route
        inputs: [k8s_logs]
        route:
          events: '.kubernetes.pod_labels.app == "kubernetes-event-exporter"'

      # Shape pod logs to match logs.pod_logs schema.
      # If the raw message is a JSON object (logstash-logback-encoder /
      # Spring Boot structured logging), promote the structured fields
      # (level, logger, thread, trace/span id, stack_trace) into top-level
      # columns; otherwise leave those columns empty.
      pod_logs_shape:
        type: remap
        inputs: [route_by_source._unmatched]
        source: |
          raw_msg = string!(.message || "")
          k = object!(.kubernetes || {})

          level       = ""
          logger      = ""
          thread      = ""
          trace_id    = ""
          span_id     = ""
          stack_trace = ""
          msg         = raw_msg

          parsed, err = parse_json(raw_msg)
          if err == null && is_object(parsed) {
              p = object!(parsed)
              level       = to_string(p.level          || "") ?? ""
              logger      = to_string(p.logger_name    || p.logger   || "") ?? ""
              thread      = to_string(p.thread_name    || p.thread   || "") ?? ""
              trace_id    = to_string(p.traceId        || p.trace_id || "") ?? ""
              span_id     = to_string(p.spanId         || p.span_id  || "") ?? ""
              stack_trace = to_string(p.stack_trace    || "") ?? ""
              msg         = to_string(p.message        || raw_msg) ?? raw_msg
          }

          . = {
              "timestamp":   .timestamp,
              "namespace":   string!(k.pod_namespace || ""),
              "pod":         string!(k.pod_name      || ""),
              "container":   string!(k.container_name || ""),
              "node":        string!(k.pod_node_name  || ""),
              "stream":      string!(.stream || ""),
              "message":     msg,
              "level":       level,
              "logger":      logger,
              "thread":      thread,
              "trace_id":    trace_id,
              "span_id":     span_id,
              "stack_trace": stack_trace,
              "labels":      object!(k.pod_labels || {})
          }

      # Shape kubernetes-event-exporter JSON into logs.k8s_events schema.
      # Each line on stdout is one JSON doc; fields are at the top level,
      # with `involvedObject` nested. See
      # https://github.com/resmoio/kubernetes-event-exporter#data-format
      events_parse:
        type: remap
        inputs: [route_by_source.events]
        source: |
          ev, err = parse_json(.message)
          if err != null {
              abort
          }
          ev = object!(ev || {})
          involved = object!(ev.involvedObject || {})
          . = {
              "timestamp": .timestamp,
              "namespace": string!(involved.namespace || ""),
              "name":      string!(involved.name || ""),
              "reason":    string!(ev.reason || ""),
              "type":      string!(ev.type || ""),
              "kind":      string!(involved.kind || ""),
              "message":   string!(ev.message || "")
          }

    # -------------------------------------------------------------------------
    # Sinks
    # -------------------------------------------------------------------------
    sinks:
      clickhouse_pod_logs:
        type: clickhouse
        inputs: [pod_logs_shape]
        endpoint: "http://${CLICKHOUSE_HOST}:8123"
        database: logs
        table: pod_logs
        compression: gzip
        date_time_best_effort: true
        skip_unknown_fields: true
        auth:
          strategy: basic
          user: vector
          password: "${CLICKHOUSE_VECTOR_PASSWORD}"
        batch:
          max_events: 10000
          timeout_secs: 5
        request:
          retry_attempts: 5
        buffer:
          type: disk
          max_size: 536870912   # 512 MiB
          when_full: block

      clickhouse_k8s_events:
        type: clickhouse
        inputs: [events_parse]
        endpoint: "http://${CLICKHOUSE_HOST}:8123"
        database: logs
        table: k8s_events
        compression: gzip
        date_time_best_effort: true
        skip_unknown_fields: true
        auth:
          strategy: basic
          user: vector
          password: "${CLICKHOUSE_VECTOR_PASSWORD}"
        batch:
          max_events: 1000
          timeout_secs: 10
        # In-memory buffer: events are low volume and disk buffer has a
        # 256 MiB minimum which is overkill for this stream.
        buffer:
          type: memory
          max_events: 5000
          when_full: block
